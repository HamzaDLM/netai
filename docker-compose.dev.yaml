  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    tmpfs:
      - /qdrant/storage

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: netops
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin
    tmpfs:
      - /var/lib/clickhouse
      - /var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    tmpfs:
      - /data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_HOST: http://localhost:5173
      BACKEND_GIT_SHA: ${BACKEND_GIT_SHA:-dev}
      CLICKHOUSE_URL: http://clickhouse:8123
      QDRANT_URL: http://qdrant:6333
      SQLALCHEMY_URL: sqlite+aiosqlite:///./data/netai_local.db
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    tmpfs:
      - /app/data

  log_ingestor:
    build:
      context: ./log_ingestor
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: syslogs
      KAFKA_GROUP_ID: log-ingestor
      CLICKHOUSE_URL: http://clickhouse:8123
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/
      VENDOR_LOOKUP_URL: ${VENDOR_LOOKUP_URL:-}
      VENDOR_REFRESH_SECS: ${VENDOR_REFRESH_SECS:-900}
      IGNORED_SYSLOG_TEXTS: ${IGNORED_SYSLOG_TEXTS:-}
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: /api/v1
        VITE_UI_VERSION: ${VITE_UI_VERSION:-}
        VITE_UI_GIT_SHA: ${VITE_UI_GIT_SHA:-dev}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"
