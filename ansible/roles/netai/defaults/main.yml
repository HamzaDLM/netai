---
netai_environment: dev

# Override in Tower inventory/group vars/extra vars.
netai_git_repo: "https://github.com/your-org/netai.git"
netai_git_branch: dev

netai_user: netai
netai_group: netai
netai_home: "/home/{{ netai_user }}"

netai_install_root: /opt/netai
netai_release_dir: "{{ netai_install_root }}/current"
netai_ui_dist_dir: "{{ netai_install_root }}/ui_dist"
netai_log_dir: /var/log/netai

netai_backend_host: 127.0.0.1
netai_backend_port: 8000
netai_server_name: _

netai_enable_log_ingestor: true

# Keep secrets in Tower credentials/extra vars, not in git.
netai_backend_env:
  PROJECT_NAME: NetAI
  CLICKHOUSE_URL: http://127.0.0.1:8123
  CLICKHOUSE_DB: "{{ netai_clickhouse_db | default('netops') }}"
  CLICKHOUSE_USER: "{{ netai_clickhouse_user | default('admin') }}"
  CLICKHOUSE_PASSWORD: "{{ netai_clickhouse_password | default('admin') }}"
  QDRANT_URL: "http://127.0.0.1:{{ netai_qdrant_http_port | default(6333) }}"
  QDRANT_COLLECTION: syslogs
  EMBEDDING_URL: http://127.0.0.1:8080/openai/embed
  EMBEDDING_MODEL: text-embedding-3-small
  EMBEDDING_API_KEY: ""
  EMBEDDING_TIMEOUT_SECS: "30"
  EMBEDDING_DIMENSION: "1536"
  LOG_QA_TOP_K: "8"
  LOG_QA_EVENT_TOP_K: "20"
  LOG_QA_LOOKBACK_SECONDS: "86400"
  LOG_QA_PROVIDER: gemini
  LOG_QA_MODEL: gemini-2.5-flash
  GEMINI_API_KEY: ""
  OPENAI_API_KEY: ""
  LLM_CONTEXT_WINDOW: ""
  LANGFUSE_ENABLED: "false"
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
  LANGFUSE_BASE_URL: ""
  LANGFUSE_SAMPLE_RATE: "1.0"

netai_log_ingestor_env:
  RUST_LOG: info
  KAFKA_BROKERS: "{{ netai_kafka_bootstrap_servers | default('127.0.0.1:9092') }}"
  KAFKA_TOPIC: syslogs
  KAFKA_GROUP_ID: log-ingestor
  CLICKHOUSE_URL: http://127.0.0.1:8123
  CLICKHOUSE_DB: "{{ netai_clickhouse_db | default('netops') }}"
  CLICKHOUSE_USER: "{{ netai_clickhouse_user | default('admin') }}"
  CLICKHOUSE_PASSWORD: "{{ netai_clickhouse_password | default('admin') }}"
  CLICKHOUSE_RETENTION_DAYS: "30"
  CLICKHOUSE_BATCH_SIZE: "1000"
  CLICKHOUSE_FLUSH_INTERVAL_MS: "1000"
  CLICKHOUSE_INSERT_QUEUE_CAPACITY: "20000"
  IGNORED_SYSLOG_TEXTS: ""
  QDRANT_URL: "http://127.0.0.1:{{ netai_qdrant_http_port | default(6333) }}"
  QDRANT_COLLECTION: syslogs
  EMBEDDING_URL: http://127.0.0.1:8080/openai/embed
  EMBEDDING_MODEL: text-embedding-3-small
  EMBEDDING_API_KEY: ""
  EMBEDDING_TIMEOUT_SECS: "30"
  EMBEDDING_DIMENSION: "1536"
  EMBEDDING_MAX_IN_FLIGHT: "4"
  EMBEDDING_MAX_REQUESTS_PER_SECOND: "4"
  EMBEDDING_MAX_RETRIES: "5"
  EMBEDDING_RETRY_BACKOFF_MS: "250"
  REDIS_URL: "{{ netai_log_ingestor_redis_url | default('redis://127.0.0.1:6379/') }}"
  VENDOR_LOOKUP_URL: ""
  VENDOR_REFRESH_SECS: "900"
  VENDOR_CACHE_PREFIX: vendor_cache

# For Vue build (ui/.env.production)
netai_ui_env:
  VITE_BASE_URL: /api/v1
